<!DOCTYPE html>
<html lang="fr">

    <meta charset="UTF-8">

    <title>BRK Creative</title>
    <style>
        /* --- VARIABLES DE COULEURS (Mix Canal+ & Apple) --- */
        :root {
            --bg-color: #000000;
            --text-main: #ffffff;
            --text-secondary: #86868b;
            --section-border: #1c1c1e;
            --card-bg: #111111; 
            --shadow-color: rgba(0, 0, 0, 0.8);
            --apple-blue: #0071e3; /* Le bleu signature d'Apple */
        }

        [data-theme="light"] {
            --bg-color: #ffffff;
            --text-main: #000000;
            --text-secondary: #6e6e73;
            --section-border: #d2d2d7;
            --card-bg: #f5f5f7;
            --shadow-color: rgba(0, 0, 0, 0.05);
            --apple-blue: #0071e3;
        }

        /* --- RESET & POLICE --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            transition: background-color 0.3s ease, color 0.3s ease, border-color 0.3s ease, transform 0.3s ease, box-shadow 0.3s ease;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            -webkit-font-smoothing: antialiased;
            line-height: 1.5;
            overflow-x: hidden;
        }

        /* --- BOUTON THÈME --- */
        .theme-toggle-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background-color: var(--card-bg);
            border: 1px solid var(--section-border);
            color: var(--text-main);
            width: 44px;
            height: 44px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1.2rem;
            display: flex; align-items: center; justify-content: center;
            z-index: 1000;
            box-shadow: 0 4px 12px var(--shadow-color);
            outline: none;
        }

        /* --- HERO SECTION --- */
        .hero {
            min-height: 50vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 60px 20px;
            background: var(--bg-color);
        }

        .hero h1 {
            font-size: 3.5rem;
            font-weight: 700;
            letter-spacing: -0.015em;
            color: var(--text-main);
            margin-bottom: 10px;
        }

        .hero p {
            font-size: 1.5rem;
            font-weight: 400;
            color: var(--text-secondary);
        }

        /* --- STRUCTURE SECTIONS & TITRES EN BLEU --- */
        .section {
            padding: 60px 20px;
            max-width: 1100px;
            margin: 0 auto;
            text-align: center;
        }

        #portfolio-section { border-top: 1px solid var(--section-border); max-width: 100%; padding: 60px 0; }
        #testimonials-section { border-top: 1px solid var(--section-border); max-width: 100%; padding: 60px 0; }
        #pricing-section { border-top: 1px solid var(--section-border); }
        #contact-section { border-top: 1px solid var(--section-border); max-width: 100%; }
        #about-section { border-top: 1px solid var(--section-border); }

        /* Titres principaux en Bleu Apple */
        .section h2.blue-title {
            color: var(--apple-blue);
            font-size: 2.2rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 30px;
        }
