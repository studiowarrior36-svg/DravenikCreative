<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>BRK Creative</title>
  <style>
    body {
      margin: 0;
      font-family: 'Montserrat', sans-serif;
      background-color: #fff;
      color: #000;
    }
    .hero {
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background: #f5f5f5;
      text-align: center;
    }
    .hero h1 {
      font-size: 3rem;
      font-weight: bold;
      margin: 0;
    }
    .hero p {
      font-size: 1.2rem;
      margin-top: 10px;
    }
    .section {
      padding: 80px 20px;
      text-align: center;
    }
    .section h2 {
      font-size: 2rem;
      margin-bottom: 20px;
    }
    .section p {
      max-width: 600px;
      margin: auto;
      font-size: 1rem;
      line-height: 1.6;
    }
    .cta a {
      text-decoration: none;
      background: black;
      color: white;
      padding: 15px 30px;
      border-radius: 5px;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <!-- Section Hero -->
  <div class="hero">
    <h1>BRK CREATIVE</h1>
    <p>Créer pour inspirer</p>
  </div>

  <!-- Section Présentation -->
  <div class="section">
    <h2>Nos Services</h2>
    <p>Nous créons des expériences visuelles uniques, inspirées par le minimalisme et la puissance du design moderne.</p>
    <div class="cta">
      <a href="#contact">Découvrir plus</a>
    </div>
  </div>

  <!-- Section Contact -->
  <div class="section" id="contact">
    <h2>Contactez-nous</h2>
    <p>Envoyez-nous un message pour collaborer sur vos projets créatifs.</p>
  </div>
</body>
</html>
